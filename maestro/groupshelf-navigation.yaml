appId: com.groupifyapp

---
# E2E Test: Group Shelf Navigation
# Tests navigating to the Group Shelf section
- launchApp:
    clearState: true
- assertVisible:
    text: "Welcome Back"

# Login first
- tapOn:
    text: "Email"
- inputText: "demo@demo.com"
- tapOn:
    text: "Password"
- inputText: "teste1234"
- tapOn: "Sign In"
- waitForAnimationToEnd
- assertVisible:
    text: "Dashboard"

# Navigate to Group Shelf from dashboard
- tapOn:
    text: "Group Shelf"
- assertVisible:
    text: "Group Shelf"
    optional: true
- assertVisible:
    text: "Search shelves..."
    optional: true

# Navigate back to dashboard
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Dashboard"
