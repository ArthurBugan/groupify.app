appId: com.groupifyapp

---
# E2E Test: Forgot Password Flow
# Tests the forgot password navigation and form
- launchApp:
    clearState: true
- assertVisible:
    text: "Welcome Back"

# Navigate to forgot password
- tapOn: "Forgot Password?"
- assertVisible:
    text: "Forgot Password"
    optional: true

# Fill in email for password reset
- tapOn:
    text: "Email"
- inputText: "demo@demo.com"

# Submit forgot password
- tapOn:
    text: "Send Reset Link"
    optional: true
- assertVisible:
    text: "Reset Link Sent"
    optional: true
- assertVisible:
    text: "Check your email"
    optional: true

# Navigate back to login
- tapOn:
    text: "Back to Login"
    optional: true
- assertVisible:
    text: "Welcome Back"
