appId: com.groupifyapp

---
# E2E Test: Complete App Navigation Flow
# Tests the complete navigation flow through all main sections
- launchApp:
    clearState: true
- assertVisible:
    text: "Welcome Back"

# Login
- tapOn:
    text: "Email"
- inputText: "demo@demo.com"
- tapOn:
    text: "Password"
- inputText: "teste1234"
- tapOn: "Sign In"
- waitForAnimationToEnd
- assertVisible:
    text: "Dashboard"

# Navigate to Groups
- tapOn:
    text: "Groups"
- assertVisible:
    text: "Groups"
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Dashboard"

# Navigate to Channels
- tapOn:
    text: "Channels"
- assertVisible:
    text: "Channels"
    optional: true
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Dashboard"

