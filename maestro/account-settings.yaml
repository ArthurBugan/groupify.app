appId: com.groupifyapp

---
# E2E Test: Account Settings
# Tests the account settings page navigation and content
- launchApp:
    clearState: true
- assertVisible:
    text: "Welcome Back"

# Login first
- tapOn:
    text: "Email"
- inputText: "demo@demo.com"
- tapOn:
    text: "Password"
- inputText: "teste1234"
- tapOn: "Sign In"
- waitForAnimationToEnd
- assertVisible:
    text: "Dashboard"

# Navigate to Settings
- tapOn:
    text: "Settings"
- assertVisible:
    text: "Settings"

# Navigate to Account
- tapOn:
    text: "Account"
- assertVisible:
    text: "Account"
    optional: true

# Verify account-related elements
- assertVisible:
    text: "Email"
    optional: true
- assertVisible:
    text: "Name"
    optional: true

# Navigate back
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Settings"
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Dashboard"
