appId: com.groupifyapp

---
# E2E Test: Blog Navigation
# Tests navigating to the blog section
- launchApp:
    clearState: true
- assertVisible:
    text: "Welcome Back"

# Login first
- tapOn:
    text: "Email"
- inputText: "demo@demo.com"
- tapOn:
    text: "Password"
- inputText: "teste1234"
- tapOn: "Sign In"
- waitForAnimationToEnd
- assertVisible:
    text: "Dashboard"

# Navigate to Blog from dashboard
- tapOn:
    text: "Blog"
- assertVisible:
    text: "Blog"
    optional: true
- assertVisible:
    text: "Blog Posts"
    optional: true

# Test search in blog
- tapOn:
    text: "Search blog posts..."
    optional: true
- inputText: "test"
- assertVisible:
    text: "test"
    optional: true

# Navigate back to dashboard
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Dashboard"
