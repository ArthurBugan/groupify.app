appId: com.groupifyapp

---
# E2E Test: Settings Navigation
# Tests navigating through all settings sections
- launchApp:
    clearState: true
- assertVisible:
    text: "Welcome Back"

# Login first
- tapOn:
    text: "Email"
- inputText: "demo@demo.com"
- tapOn:
    text: "Password"
- inputText: "teste1234"
- tapOn: "Sign In"
- waitForAnimationToEnd
- assertVisible:
    text: "Dashboard"

# Navigate to Settings
- tapOn:
    text: "Settings"
- assertVisible:
    text: "Settings"

# Verify settings menu items
- assertVisible:
    text: "Account"
- assertVisible:
    text: "Appearance"
- assertVisible:
    text: "Billing"
- assertVisible:
    text: "Groups"

# Navigate to Account settings
- tapOn:
    text: "Account"
- assertVisible:
    text: "Account"
    optional: true

# Go back to settings
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Settings"

# Navigate to Appearance settings
- tapOn:
    text: "Appearance"
- assertVisible:
    text: "Appearance"
    optional: true
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Settings"

# Navigate to Billing settings
- tapOn:
    text: "Billing"
- assertVisible:
    text: "Billing"
    optional: true
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Settings"

# Navigate back to dashboard
- tapOn:
    text: "Back"
    optional: true
- assertVisible:
    text: "Dashboard"
