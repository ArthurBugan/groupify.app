appId: com.groupifyapp

---
# E2E Test: Share Links Navigation
# Tests navigating to the Share Links section
- launchApp:
    clearState: true
- assertVisible:
    text: "Welcome Back"

# Login first
- tapOn:
    text: "Email"
- inputText: "demo@demo.com"
- tapOn:
    text: "Password"
- inputText: "teste1234"
- tapOn: "Sign In"
- waitForAnimationToEnd
- assertVisible:
    text: "Dashboard"

# Navigate to Share Links from dashboard
- tapOn:
    text: "Share Links"
- assertVisible:
    text: "Share Links"
    optional: true
- assertVisible:
    text: "Share Links"
    optional: true

# Navigate back to dashboard
- swipe:
    direction: "down"
    speed: "fast"
- assertVisible:
    text: "Dashboard"
